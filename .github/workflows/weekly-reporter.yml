name: Weekly Executive Reporter

on:
  schedule:
    - cron: '0 6 * * 0' # Runs every Sunday at 06:00 UTC (08:00 Israel time)
  workflow_dispatch:

jobs:
  run-reporter-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch git log history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Executive Reporter Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx tsx scripts/agent-reporter.ts
        
      # Optional: Send email using a GitHub Action or Composio API
      # If using SMTP (Gmail):
