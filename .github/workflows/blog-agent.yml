name: Blog Content Agent

on:
  schedule:
    # Runs at 9:00 AM Israel Time (07:00 UTC) on Sunday and Wednesday
    - cron: '0 7 * * 0,3'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci --no-progress --no-audit --no-fund --loglevel=error

      - name: Run Blog Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run agent:blog

      - name: Push Changes
        run: |
          git config user.name "Blog Agent Bot"
          git config user.email "bot@grar-haifa.co.il"
          git add -A
          git diff --staged --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "blog: auto-generated article [skip ci]"
          # Pull latest changes from remote before pushing (prevents conflicts)
          for i in 1 2 3; do
            git pull --rebase origin main || {
              echo "Rebase failed — checking for conflict markers..."
              if grep -rn '<<<<<<< ' -- . 2>/dev/null; then
                echo "ERROR: Conflict markers detected. Aborting."
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
            }
            git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
