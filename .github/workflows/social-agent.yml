name: Weekly Social SEO Agent

on:
  schedule:
    - cron: '0 6 * * 4' # Runs every Thursday at 06:00 UTC (~08:00 Israel time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-social-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Social SEO Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/agent-social.ts
        
      - name: Commit & Push New Social Guide
        run: |
          git config --global user.name "AI-Social-Agent"
          git config --global user.email "social@towing.haifa.ai"
          git add src/lib/guides.ts || true
          git commit -m "Auto-generate Social SEO guide [skip ci]" || echo "No changes to commit"
          git push
