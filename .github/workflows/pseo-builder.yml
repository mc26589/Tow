name: pSEO & E-E-A-T Builder

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Builder Agent (Next.js RSC, SGE, E-E-A-T)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run agent:builder
        
      # Commit changes to Next.js App Router -> triggers Vercel deployment
      - name: Commit & Push New Pages to Main
        run: |
          git config --global user.name "AI-Towing-Agent"
          git config --global user.email "agent@towing.haifa.ai"
          mkdir -p src/app/areas/
          git add src/app/areas/ || true
          git diff --staged --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Auto-generate pSEO pages: E-E-A-T & SGE [skip ci]"
          # Pull latest changes from remote before pushing (prevents conflicts)
          for i in 1 2 3; do
            git pull --rebase origin main || {
              echo "Rebase failed — checking for conflict markers..."
              if grep -rn '<<<<<<< ' -- . 2>/dev/null; then
                echo "ERROR: Conflict markers detected. Aborting."
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
            }
            git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
