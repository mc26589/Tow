name: Weekly Social Media Agent

on:
  schedule:
    # Runs at 09:00 UTC (11:00 or 12:00 Israel time) every Tuesday
    - cron: '0 9 * * 2'
  workflow_dispatch: # Allows manual triggering

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --loglevel=error
        
      - name: Run Social Media Agent
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_FACEBOOK }}
          # FACEBOOK_USER_ACCESS_TOKEN if needed for group discovery
        run: npm run agent:social

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/guides.ts
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: add new weekly social blog guide [skip ci]"
          # Pull latest changes from remote before pushing (prevents conflicts)
          for i in 1 2 3; do
            git pull --rebase origin main || {
              echo "Rebase failed — checking for conflict markers..."
              if grep -rn '<<<<<<< ' src/lib/guides.ts 2>/dev/null; then
                echo "ERROR: Conflict markers detected in guides.ts. Aborting."
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
            }
            git push origin main && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

