name: Weekly Social Media Agent

on:
  schedule:
    # Runs at 09:00 UTC (11:00 or 12:00 Israel time) every Tuesday
    - cron: '0 9 * * 2'
  workflow_dispatch: # Allows manual triggering

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --loglevel=error
        
      - name: Run Social Media Agent
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_FACEBOOK }}
          # FACEBOOK_USER_ACCESS_TOKEN if needed for group discovery
        run: npm run agent:social

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/guides.ts
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: add new weekly social blog guide [skip ci]"
            git push origin main
          fi
